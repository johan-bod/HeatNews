<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow center -->
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="url(#glow)"/>

  <!-- Globe outline -->
  <circle cx="600" cy="315" r="200" fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.6"/>
  <circle cx="600" cy="315" r="200" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>

  <!-- Latitude lines -->
  <ellipse cx="600" cy="315" rx="200" ry="60" fill="none" stroke="#1e3a5f" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="600" cy="315" rx="200" ry="120" fill="none" stroke="#1e3a5f" stroke-width="0.8" opacity="0.3"/>
  <line x1="600" y1="115" x2="600" y2="515" stroke="#1e3a5f" stroke-width="0.8" opacity="0.4"/>
  <line x1="440" y1="145" x2="760" y2="485" stroke="#1e3a5f" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="315" x2="800" y2="315" stroke="#1e3a5f" stroke-width="0.8" opacity="0.3"/>

  <!-- Heat dots (story markers) -->
  <circle cx="580" cy="260" r="8" fill="#dc2626" opacity="0.9"/>
  <circle cx="580" cy="260" r="16" fill="#dc2626" opacity="0.2"/>
  <circle cx="640" cy="300" r="6" fill="#f97316" opacity="0.8"/>
  <circle cx="640" cy="300" r="12" fill="#f97316" opacity="0.15"/>
  <circle cx="530" cy="330" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="530" cy="330" r="10" fill="#f59e0b" opacity="0.15"/>
  <circle cx="670" cy="240" r="4" fill="#f59e0b" opacity="0.6"/>
  <circle cx="620" cy="360" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="555" cy="285" r="3" fill="#94a3b8" opacity="0.5"/>
  <circle cx="700" cy="320" r="4" fill="#f97316" opacity="0.6"/>

  <!-- Arc connecting dots -->
  <path d="M 580 260 Q 620 230 640 300" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 3"/>
  <path d="M 640 300 Q 610 340 530 330" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Brand name -->
  <text x="600" y="556" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#f1f5f9" text-anchor="middle" letter-spacing="-1">HeatStory</text>

  <!-- Tagline -->
  <text x="600" y="594" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle" letter-spacing="2">MAP COVERAGE · SPOT PATTERNS · SURFACE STORIES</text>

  <!-- Amber accent line -->
  <rect x="540" y="530" width="120" height="2" rx="1" fill="#f59e0b" opacity="0.6"/>
</svg>
